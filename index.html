<!DOCTYPE html>
<html>
<head>
    <title>3D Car Game (Mobile & Desktop)</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 10;
        }
        .btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            user-select: none;
            touch-action: none;
        }
    </style>
</head>
<body>

<div id="controls">
    <div class="btn" id="btn-left">⭠</div>
    <div class="btn" id="btn-up">⭡</div>
    <div class="btn" id="btn-down">⭣</div>
    <div class="btn" id="btn-right">⭢</div>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js';

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // sky blue

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,5,-10);

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10,20,10);
dirLight.castShadow = true;
scene.add(dirLight);
scene.add(new THREE.AmbientLight(0xffffff,0.5));

// Ground
const groundGeo = new THREE.PlaneGeometry(200,200);
const groundMat = new THREE.MeshStandardMaterial({color:0x228B22});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Car
let car;
const loader = new GLTFLoader();
loader.load('car-good.glb', (gltf)=>{
    car = gltf.scene;
    car.scale.set(1,1,1);
    car.traverse(child => { if(child.isMesh) child.castShadow = true; });
    scene.add(car);
});

// Input handling
const keys = { w:false, a:false, s:false, d:false };
window.addEventListener('keydown', e=>{ if(keys[e.key.toLowerCase()]!==undefined) keys[e.key.toLowerCase()]=true; });
window.addEventListener('keyup', e=>{ if(keys[e.key.toLowerCase()]!==undefined) keys[e.key.toLowerCase()]=false; });

// Mobile buttons
['up','down','left','right'].forEach(dir=>{
    const btn = document.getElementById(`btn-${dir}`);
    btn.addEventListener('touchstart', e=>{ keys[dir[0]] = true; e.preventDefault(); });
    btn.addEventListener('touchend', e=>{ keys[dir[0]] = false; e.preventDefault(); });
});

// Car parameters
let speed = 0;
const maxSpeed = 0.2;
const accel = 0.005;
const decel = 0.01;
const turnSpeed = 0.03;

// Resize
window.addEventListener('resize', ()=> {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animate
function animate(){
    requestAnimationFrame(animate);
    if(car){
        // Forward/backward
        if(keys.w) speed += accel;
        else if(keys.s) speed -= accel;
        else { if(speed>0) speed-=decel; if(speed<0) speed+=decel; }
        speed = Math.max(-maxSpeed, Math.min(maxSpeed, speed));

        // Turn
        if(keys.a) car.rotation.y += turnSpeed*(speed/maxSpeed);
        if(keys.d) car.rotation.y -= turnSpeed*(speed/maxSpeed);

        // Move
        car.position.x -= Math.sin(car.rotation.y)*speed;
        car.position.z -= Math.cos(car.rotation.y)*speed;

        // Camera follow
        const offset = new THREE.Vector3(0,5,-10).applyMatrix4(car.matrixWorld);
        camera.position.lerp(offset,0.1);
        camera.lookAt(car.position);
    }

    renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
