<!DOCTYPE html>
<html>
<head>
    <title>3D Car Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js';

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // sky blue

// Camera
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.set(0, 5, -10);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Car model
let car;
const loader = new GLTFLoader();
loader.load(
    'car-good.glb',
    (gltf) => {
        car = gltf.scene;
        car.scale.set(1, 1, 1);
        car.position.set(0, 0, 0);
        car.traverse((child) => {
            if (child.isMesh) child.castShadow = true;
        });
        scene.add(car);
    },
    undefined,
    (error) => console.error(error)
);

// Controls (for debugging camera)
const controls = new OrbitControls(camera, renderer.domElement);
controls.enabled = false; // disabled during game; can enable for debug

// Keyboard input
const keys = { w: false, a: false, s: false, d: false };
window.addEventListener('keydown', (e) => { if (keys[e.key.toLowerCase()] !== undefined) keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', (e) => { if (keys[e.key.toLowerCase()] !== undefined) keys[e.key.toLowerCase()] = false; });

// Game parameters
let speed = 0;
const maxSpeed = 0.2;
const acceleration = 0.005;
const deceleration = 0.01;
const turnSpeed = 0.03;

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    if (car) {
        // Forward/backward
        if (keys.w) speed += acceleration;
        else if (keys.s) speed -= acceleration;
        else { // slow down naturally
            if (speed > 0) speed -= deceleration;
            if (speed < 0) speed += deceleration;
        }
        speed = Math.max(-maxSpeed, Math.min(maxSpeed, speed));

        // Turn
        if (keys.a) car.rotation.y += turnSpeed * (speed / maxSpeed);
        if (keys.d) car.rotation.y -= turnSpeed * (speed / maxSpeed);

        // Move car
        car.position.x -= Math.sin(car.rotation.y) * speed;
        car.position.z -= Math.cos(car.rotation.y) * speed;

        // Camera follows car
        const relativeCameraOffset = new THREE.Vector3(0, 5, -10);
        const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
        camera.position.lerp(cameraOffset, 0.1);
        camera.lookAt(car.position);
    }

    renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
