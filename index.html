<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Striker Racing Pro</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  z-index:10;
}
#garage {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.9);
  padding:20px;
  color:white;
  display:none;
}
button { padding:10px; margin:5px; }
#steer {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:200px;
}
#nitro {
  position:absolute;
  bottom:20px;
  right:20px;
  padding:15px;
  background:orange;
  border:none;
}
</style>
</head>
<body>

<div id="ui">
💰 Money: <span id="money">0</span><br>
🚗 Car: <span id="carName">JDM</span>
</div>

<div id="garage">
<h2>Garage</h2>
<button onclick="buyCar('Muscle',500)">Buy Muscle (500)</button>
<button onclick="buyCar('Lambo',1500)">Buy Lamborghini (1500)</button>
<button onclick="buyCar('F1',4000)">Buy F1 (4000)</button>
<br>
<button onclick="closeGarage()">Close</button>
</div>

<input type="range" id="steer" min="-3" max="3" step="0.1" value="0">
<button id="nitro">NITRO</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

let roadGeo = new THREE.PlaneGeometry(10,1000);
let roadMat = new THREE.MeshPhongMaterial({color:0x222222});
let road = new THREE.Mesh(roadGeo,roadMat);
road.rotation.x = -Math.PI/2;
scene.add(road);

let car;
let carType = "JDM";
let money = 0;
let speed = 0.6;
let baseSpeed = 0.6;

function createCar(type){
  if(car) scene.remove(car);

  let geo;

  if(type==="JDM") geo = new THREE.BoxGeometry(1,0.5,2);
  if(type==="Muscle") geo = new THREE.BoxGeometry(1.2,0.6,2.5);
  if(type==="Lambo") geo = new THREE.BoxGeometry(1,0.4,2);
  if(type==="F1") geo = new THREE.BoxGeometry(0.8,0.3,3);

  let mat = new THREE.MeshPhongMaterial({color:0xff0000});
  car = new THREE.Mesh(geo,mat);
  car.position.y=0.5;
  scene.add(car);

  carType=type;
  document.getElementById("carName").innerText=type;

  if(type==="Muscle") baseSpeed=0.7;
  if(type==="Lambo") baseSpeed=1.0;
  if(type==="F1") baseSpeed=1.5;
  if(type==="JDM") baseSpeed=0.6;

  speed=baseSpeed;
}

createCar("JDM");

let enemies=[];
function spawnEnemy(){
  let geo=new THREE.BoxGeometry(1,0.5,2);
  let mat=new THREE.MeshPhongMaterial({color:0xffff00});
  let e=new THREE.Mesh(geo,mat);
  e.position.x=(Math.random()-0.5)*6;
  e.position.y=0.5;
  e.position.z=-200;
  scene.add(e);
  enemies.push(e);
}
setInterval(spawnEnemy,1500);

document.getElementById("steer").oninput=function(){
  car.position.x=this.value;
};

document.getElementById("nitro").onclick=function(){
  speed=baseSpeed*3;
  setTimeout(()=>{speed=baseSpeed;},2000);
};

function buyCar(type,cost){
  if(money>=cost){
    money-=cost;
    document.getElementById("money").innerText=money;
    createCar(type);
  } else {
    alert("Not enough money!");
  }
}

function closeGarage(){
  document.getElementById("garage").style.display="none";
}

window.addEventListener("dblclick",()=>{
  document.getElementById("garage").style.display="block";
});

camera.position.set(0,5,10);
camera.lookAt(0,0,0);

function animate(){
  requestAnimationFrame(animate);

  enemies.forEach((e,i)=>{
    e.position.z+=speed;

    if(Math.abs(car.position.x-e.position.x)<1 &&
       Math.abs(car.position.z-e.position.z)<1.5){
       alert("Game Over!");
       location.reload();
    }

    if(e.position.z>10){
      scene.remove(e);
      enemies.splice(i,1);
      money+=10;
      document.getElementById("money").innerText=money;
    }
  });

  renderer.render(scene,camera);
}

animate();
</script>
</body>
  </html>
